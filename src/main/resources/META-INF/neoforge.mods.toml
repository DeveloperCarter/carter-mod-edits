# src/main/resources/META-INF/neoforge.mods.toml
modLoader="javafml"
loaderVersion="[4,)"          # <-- required; your log shows fml_loader 4.0.41
license="MIT"

[[mods]]
modId="carter_mod"
version="${file.jarVersion}"
displayName="Carter Mod Edits"
authors="DeveloperCarter"
description='''
Carter's personal ATM10 tweaks: a server-side countdown timer command and a
client-side FOV fix that stops Artifacts Running Shoes from zooming the camera.
'''

[[dependencies.carter_mod]]
modId="neoforge"
mandatory=true
versionRange="[21,)"          # any 21.x
ordering="NONE"
side="BOTH"

[[dependencies.carter_mod]]
modId="minecraft"
mandatory=true
versionRange="[1.21.1,1.22)"
ordering="NONE"
side="BOTH"

# Client-side FOV correction for the Running Shoes (see RunningShoesFovMixin).
[[mixins]]
config="carter_mod.mixins.json"
